version: "3"
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --name nakama1 --database.address postgres:localdb@postgres:5432/nakama --logger.level DEBUG --session.token_expiry_sec 7200 --runtime.path /nakama/data/modules --runtime.js_entrypoint main.js
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/build:/nakama/data/modules
    ports:
      - "7349:7349"   # client API
      - "7350:7350"   # console
      - "7351:7351"   # gRPC
    restart: unless-stopped

volumes:
  pgdata:
